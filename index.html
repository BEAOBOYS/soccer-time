!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Soccer Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
    margin: 0;
    background: #1b5e20;
    overflow: hidden;
    font-family: Arial, sans-serif;
    color: white;
}
canvas {
    display: block;
    margin: auto;
    background: #4caf50;
}
#hud {
    position: absolute;
    top: 10px;
    width: 100%;
    text-align: center;
    font-size: 20px;
}
#power {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
}
</style>
</head>
<body>

<div id="hud">
    <span id="timer">60</span>s |
    Red <span id="r">0</span> - <span id="b">0</span> Blue
</div>
<progress id="power" value="0" max="100"></progress>
<canvas id="game" width="900" height="450"></canvas>

<audio id="kick" src="sounds/kick.wav"></audio>
<audio id="goal" src="sounds/goal.wav"></audio>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let time = 60;
let power = 0;
let charging = false;

const sounds = {
    kick: document.getElementById("kick"),
    goal: document.getElementById("goal")
};

const ball = { x: 450, y: 225, r: 10, vx: 0, vy: 0, mass: 1 };

const p1 = { x: 150, y: 225, r: 20, color: "red", skin: null };
const p2 = { x: 750, y: 225, r: 20, color: "blue", skin: null };

const gk1 = { x: 30, y: 225, r: 18 };
const gk2 = { x: 870, y: 225, r: 18 };

let score = { r: 0, b: 0 };
let keys = {};

document.addEventListener("keydown", e => {
    keys[e.key] = true;
    if (e.key === " ") charging = true;
});
document.addEventListener("keyup", e => {
    keys[e.key] = false;
    if (e.key === " ") {
        charging = false;
        shoot(p1);
    }
});

function shoot(player) {
    const dx = ball.x - player.x;
    const dy = ball.y - player.y;
    const d = Math.hypot(dx, dy);
    if (d < 40) {
        ball.vx += (dx / d) * (power / 4);
        ball.vy += (dy / d) * (power / 4);
        power = 0;
        sounds.kick.play();
    }
}

function move(p, up, down, left, right) {
    if (keys[up]) p.y -= 4;
    if (keys[down]) p.y += 4;
    if (keys[left]) p.x -= 4;
    if (keys[right]) p.x += 4;
}

function aiGoalkeeper(gk) {
    gk.y += (ball.y - gk.y) * 0.05;
}

function updateBall() {
    ball.x += ball.vx;
    ball.y += ball.vy;
    ball.vx *= 0.99;
    ball.vy *= 0.99;

    if (ball.y < ball.r || ball.y > canvas.height - ball.r) ball.vy *= -1;

    if (ball.x < 0) score.b++, reset();
    if (ball.x > canvas.width) score.r++, reset();
}

function reset() {
    ball.x = 450; ball.y = 225;
    ball.vx = ball.vy = 0;
    sounds.goal.play();
}

function drawCircle(o, c) {
    ctx.beginPath();
    ctx.arc(o.x, o.y, o.r, 0, Math.PI * 2);
    ctx.fillStyle = c;
    ctx.fill();
}

function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (charging && power < 100) power += 1;
    document.getElementById("power").value = power;

    move(p1, "w", "s", "a", "d");
    move(p2, "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight");

    aiGoalkeeper(gk1);
    aiGoalkeeper(gk2);

    updateBall();

    drawCircle(ball, "white");
    drawCircle(p1, p1.color);
    drawCircle(p2, p2.color);
    drawCircle(gk1, "gray");
    drawCircle(gk2, "gray");

    requestAnimationFrame(gameLoop);
}

setInterval(() => {
    time--;
    document.getElementById("timer").textContent = time;
    if (time <= 0) alert("Game Over!");
}, 1000);

gameLoop();
</script>
</body>
</html>
